name: Promote LTBase Prod

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: Official LTBase release tag to promote
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  approve:
    runs-on: ubuntu-24.04
    environment: prod
    steps:
      - run: echo "prod approval granted"

  promote:
    needs:
      - approve
    uses: Lychee-Technology/ltbase-deploy-workflows/.github/workflows/promote-prod.yml@v1
    with:
      pulumi_stack: prod
      aws_region: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
      release_id: ${{ inputs.release_id }}
      pulumi_backend_url: ${{ vars.PULUMI_BACKEND_URL }}
      releases_repo: ${{ vars.LTBASE_RELEASES_REPO || 'Lychee-Technology/ltbase-releases' }}
      working_directory: infra
    secrets:
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN_PROD }}
      ltbase_releases_token: ${{ secrets.LTBASE_RELEASES_TOKEN }}
      cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
